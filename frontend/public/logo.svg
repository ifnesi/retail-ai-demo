  <!-- Street lines (horizontal) -->
  <rect x="15" y="35" width="70" height="3" fill="url(#grad1)" opacity="0.6"/>
  <rect x="15" y="50" width="70" height="3" fill="url(#grad1)" opacity="0.6"/>

  <!-- Geometric accent -->
